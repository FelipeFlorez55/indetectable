<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Indetectable">
  <defs>
    <linearGradient id="ink" x1="10" y1="44" x2="54" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- forensic tile: near-black surface with a subtle border (specs/10 palette) -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="#0a0a0a"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="14.5" fill="none" stroke="#262626" stroke-width="1"/>

  <!-- the human stroke: a real-ink S-curve that dissolves into dots = "indetectable" -->
  <path d="M11 41 C 17 24, 25 51, 33 33"
        fill="none" stroke="url(#ink)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="38.6" cy="30.2" r="2.9" fill="url(#ink)" opacity="0.92"/>
  <circle cx="43.8" cy="27.6" r="2.3" fill="url(#ink)" opacity="0.66"/>
  <circle cx="48.4" cy="25.4" r="1.7" fill="url(#ink)" opacity="0.44"/>
  <circle cx="52.4" cy="23.6" r="1.1" fill="url(#ink)" opacity="0.26"/>
</svg>
